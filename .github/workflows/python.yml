on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      python-version:
        type: string
        default: "3.12"
      package-manager:
        type: string
        default: "pip"
      lint:
        type: boolean
        default: true
      linter:
        type: string
        default: "ruff"
      unit:
        type: boolean
        default: true
      test-command:
        type: string
        default: "python -m unittest discover -s tests"

jobs:
  lint:
    if: ${{ inputs.lint }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate linter and package manager
        run: |
          set -euo pipefail
          if [ "${{ inputs.linter }}" != "ruff" ] && [ "${{ inputs.linter }}" != "pylint" ]; then
            echo "Unsupported linter: ${{ inputs.linter }}"
            echo "Supported linters: ruff, pylint"
            exit 1
          fi
          if [ "${{ inputs.package-manager }}" != "pip" ] && [ "${{ inputs.package-manager }}" != "poetry" ]; then
            echo "Unsupported package manager: ${{ inputs.package-manager }}"
            echo "Supported package managers: pip, poetry"
            exit 1
          fi

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |    
            python:
              - added|modified: 'services/${{ inputs.service }}/**/*.py'

      - name: Install Poetry
        if: inputs.package-manager == 'poetry'
        run: pipx install poetry

      - name: Set up Python
        if: steps.changes.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: |
            services/${{ inputs.service }}/requirements*.txt
            services/${{ inputs.service }}/pyproject.toml
            services/${{ inputs.service }}/poetry.lock

      - name: Install  dependencies
        if: steps.changes.outputs.python == 'true' && inputs.linter == 'pylint'
        run: &install-python |
          set -euo pipefail
          if [ "${{ inputs.package-manager }}" = "pip" ]; then
            if [ -f requirements.txt ]; then
              python -m pip install -r requirements.txt
            else
              python -m pip install -e .
            fi
          elif [ "${{ inputs.package-manager }}" = "poetry" ]; then
            poetry install
          fi

      - name: Run linter
        if: steps.changes.outputs.python == 'true'
        run: |
          set -euo pipefail
          files=()
          for file in ${{ steps.changes.outputs.python_files }}; do
            files+=("$(echo "$file" | cut -d'/' -f3-)")
          done
          python -m pip install ${{ inputs.linter }}
          if [ "${{ inputs.linter }}" = "ruff" ]; then
            ruff check "${files[@]}"
          elif [ "${{ inputs.linter }}" = "pylint" ]; then
            pylint "${files[@]}"
          fi

  unit:
    if: ${{ inputs.unit }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: services/${{ inputs.service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate package manager
        run: |
          set -euo pipefail
          if [ "${{ inputs.package-manager }}" != "pip" ] && [ "${{ inputs.package-manager }}" != "poetry" ]; then
            echo "Unsupported package manager: ${{ inputs.package-manager }}"
            echo "Supported package managers: pip, poetry"
            exit 1
          fi

      - name: Get changed files
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            unit:
              - added|modified: 'services/${{ inputs.service }}/**/*.py'
              - added|modified: 'services/${{ inputs.service }}/requirements*.txt'
              - added|modified: 'services/${{ inputs.service }}/pyproject.toml'
              - added|modified: 'services/${{ inputs.service }}/poetry.lock'

      - name: Install Poetry
        if: inputs.package-manager == 'poetry'
        run: pipx install poetry
        
      - name: Set up Python
        if: steps.changes.outputs.unit == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: |
            services/${{ inputs.service }}/requirements*.txt
            services/${{ inputs.service }}/pyproject.toml
            services/${{ inputs.service }}/poetry.lock

      - name: Install dependencies
        if: steps.changes.outputs.unit == 'true'
        run: *install-python

      - name: Run unit tests
        if: steps.changes.outputs.unit == 'true'
        run: |
          set -euo pipefail
          ${{ inputs.test-command }}