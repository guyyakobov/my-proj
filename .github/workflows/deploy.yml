on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      environment:
        type: string
        default: ""

  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Set short SHA
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "SHORT_SHA=${SHA::7}" >> "$GITHUB_ENV"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_ECR_REGION }}
      - name: promote image to ${{ inputs.environment }} in the registry
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ inputs.service }}" \
            --image-ids imageTag=$SHORT_SHA \
            --query 'images[0].imageManifest' \
            --output text)
          aws ecr put-image \
            --repository-name "${{ inputs.service }}" \
            --image-tag "${{inputs.environment}}" \
            --image-manifest $MANIFEST
          if [ "${{inputs.environment}}" == prod ]; then
            aws ecr put-image \
              --repository-name "${{ inputs.service }}" \
              --image-tag "${{inputs.environment}}-$SHORT_SHA" \
              --image-manifest $MANIFEST
          fi  
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Update Helm image tag
        uses: mikefarah/yq@v4
        with:
          cmd: |
            cd helm/charts/${{ inputs.service }}
            yq -i '.image.tag = env(SHORT_SHA)' values-${{ inputs.environment }}.yaml

