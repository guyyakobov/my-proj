jobs:
  build:
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_ECR_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          echo "SHORT_SHA=${SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/${{ inputs.service }}
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ inputs.service }}:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ vars.ECR_REGISTRY }}/${{ inputs.service }}:cache
          cache-to: type=registry,ref=${{ vars.ECR_REGISTRY }}/${{ inputs.service }}:cache,mode=max
          build-args: ${{ inputs.build-args }}