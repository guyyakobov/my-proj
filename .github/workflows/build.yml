on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      build-args:
        type: string
        default: ""


  build:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - id: auth
        name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/ci/providers/github
          service_account: ${{ vars.GCP_SA }}
          token_format: access_token
      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_MAIN_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./services/${{ inputs.service }}
          push: true
          tags: ${{ vars.GCP_MAIN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/services/${{ matrix.service }}:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ vars.GCP_MAIN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/services/${{ matrix.service }}:cache
          cache-to: type=registry,ref=${{ vars.GCP_MAIN_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/services/${{ matrix.service }}:cache,mode=max
          build-args: ${{ inputs.build-args }}
