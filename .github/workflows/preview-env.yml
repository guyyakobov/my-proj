on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      strategy:
        type: string
        default: "shared-dev" # shared-dev | isolated-dev | disabled
      operation:
        required: true # deploy | cleanup
        type: string

jobs:
  preview-env:
    if: ${{ inputs.strategy != 'disabled' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: helm/charts/${{ inputs.service }}

    steps:
      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.operation }}" =~ ^(deploy|cleanup)$ ]]; then
            echo "Invalid operation"
            exit 1
          fi

          if [[ ! "${{ inputs.strategy }}" =~ ^(shared-dev|isolated-dev|disabled)$ ]]; then
            echo "Invalid strategy"
            exit 1
          fi

      - name: Set namespace
        run: |
          if [[ "${{ inputs.strategy }}" == "isolated-dev" ]]; then
            echo "NAMESPACE=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"
          else
            echo "NAMESPACE=${{ vars.EKS_DEV_NAMESPACE }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_DEV_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ vars.EKS_DEV_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_DEV_REGION }}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      # - name: Inject secrets into preview namespace
      #   if: inputs.strategy == 'isolated-dev' && inputs.operation == 'deploy'
      #   run: |
      #     # TODO

      - name: Deploy preview
        if: ${{ inputs.operation == 'deploy' }}
        run: |
          if [[ "${{ inputs.strategy }}" == "isolated-dev" ]]; then
            kubectl create namespace "$NAMESPACE" \
              --dry-run=client -o yaml | kubectl apply -f -
          fi

          helm template "${{ inputs.service }}" . \
            -f ../global/values-dev.yaml \
            -f ../global/values-preview.yaml \
            -f values-dev.yaml \
            -f values-preview.yaml \
            --set image.tag="${{ github.sha }}" \
            | kubectl apply -n "$NAMESPACE" -f -

          kubectl rollout status deployment/${{ inputs.service }} \
            -n "$NAMESPACE" \
            --timeout=5m

      - name: Cleanup preview
        if: ${{ inputs.operation == 'cleanup' }}
        run: |
          if [[ "${{ inputs.strategy }}" == "isolated-dev" ]]; then
            kubectl delete namespace "$NAMESPACE" --ignore-not-found
          else
            helm template "${{ inputs.service }}" . \
              -f ../global/values-dev.yaml \
              -f values-dev.yaml \
              | kubectl apply -n "$NAMESPACE" -f -

            kubectl rollout status deployment/${{ inputs.service }} \
              -n "$NAMESPACE" \
              --timeout=5m